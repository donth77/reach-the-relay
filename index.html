<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Reach the Relay</title>

    <!-- Primary meta -->
    <meta
      name="description"
      content="Post-AI-collapse party VIP-protection RPG. Pick a leader, recruit a crew, and guide Dr. Vey through three routes to the Relay. SNES-style ATB combat, built for Vibe Jam 2026."
    />
    <meta name="author" content="Tom Donohue" />
    <meta name="theme-color" content="#0a0a0a" />

    <!-- Open Graph (Facebook, Discord, LinkedIn, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Reach the Relay" />
    <meta
      property="og:description"
      content="Post-AI-collapse party VIP-protection RPG. SNES-style ATB combat. Built for Vibe Jam 2026."
    />
    <meta property="og:image" content="./og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Reach the Relay" />
    <meta
      name="twitter:description"
      content="Post-AI-collapse party VIP-protection RPG. SNES-style ATB combat. Built for Vibe Jam 2026."
    />
    <meta name="twitter:image" content="./og-image.png" />

    <!-- Favicon — drop a favicon.png in /public when ready; 32×32 recommended -->
    <link rel="icon" type="image/png" href="./favicon.png" />

    <!-- Preload hints — kick off the fetches for the first-paint title-
         screen assets in parallel with the JS bundle download, so by the
         time Phaser's BootScene runs the browser has them (or nearly so)
         already in cache. No loading screen / progress bar; just
         shortening the blank-viewport window (Vibe Jam rule 8). -->
    <link
      rel="preload"
      href="./assets/fonts/silkscreen-400.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link rel="preload" href="./assets/title/bg-off.png" as="image" />
    <link rel="preload" href="./assets/title/bg-on.png" as="image" />
    <link rel="preload" href="./assets/logo/logo.png" as="image" />

    <!-- Self-hosted Silkscreen (no runtime CDN fetch to Google Fonts) -->
    <style>
      @font-face {
        font-family: 'Silkscreen';
        font-style: normal;
        font-weight: 400;
        font-display: swap;
        src: url('./assets/fonts/silkscreen-400.woff2') format('woff2');
      }
      @font-face {
        font-family: 'Silkscreen';
        font-style: normal;
        font-weight: 700;
        font-display: swap;
        src: url('./assets/fonts/silkscreen-700.woff2') format('woff2');
      }
      html,
      body {
        margin: 0;
        padding: 0;
        background: #0a0a0a;
        overflow: hidden;
        font-family: system-ui, sans-serif;
      }
      /* #game must fill the viewport so Phaser's `autoCenter: CENTER_BOTH`
         can compute correct margins off a known parent size. No CSS-level
         flex/grid centering — it fights Phaser's margin-based centering and
         produces asymmetric offsets. */
      html,
      body,
      #game {
        width: 100vw;
        height: 100vh;
        height: 100dvh;
      }
      canvas {
        display: block;
      }
      /* Pre-Phaser splash — paints on first HTML parse so the user sees the
         logo immediately instead of a blank #0a0a0a void while the JS bundle
         downloads + parses + BootScene preloads. The logo image is already
         <link rel="preload">'d above. Sits as a fixed overlay above the
         canvas; TitleScene.create() fades + removes it once the real title
         art is on screen. NOT a loading screen by Vibe Jam rules — no bar,
         no text, just a static splash for visual continuity.

         Position math mirrors TitleScene's logo on the 1280x720 canvas:
         center at (640, 311.8) with origin 0.5, displayed width 800px.
         The .splash-canvas div emulates Phaser's FIT/CENTER_BOTH letterbox
         (fills the viewport while preserving 16:9), then the img is placed
         in canvas-relative coordinates so it lines up pixel-for-pixel with
         the Phaser logo regardless of viewport aspect ratio. */
      #splash {
        position: fixed;
        inset: 0;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0a0a0a;
        pointer-events: none;
        transition: opacity 250ms ease-out;
      }
      #splash .splash-canvas {
        position: relative;
        width: min(100vw, calc(100vh * 16 / 9));
        height: min(100vh, calc(100vw * 9 / 16));
      }
      #splash .splash-canvas img {
        position: absolute;
        left: 50%;
        /* Phaser y = height*0.44 - 5 on 720-tall canvas → 311.8/720 */
        top: calc(311.8 / 720 * 100%);
        transform: translate(-50%, -50%);
        /* Phaser displayed width = 800 / 1280 = 62.5% */
        width: 62.5%;
        height: auto;
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <div class="splash-canvas"><img src="./assets/logo/logo.png" alt="Reach the Relay" /></div>
    </div>
    <div id="game"></div>
    <script type="module" src="/src/main.ts"></script>
    <script async src="https://vibejam.cc/2026/widget.js"></script>
  </body>
</html>
